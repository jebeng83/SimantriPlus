<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test BPJS Error Handling</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container mt-5">
        <h2>Test BPJS Error Handling</h2>
        
        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Test Authentication Error</h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-warning" onclick="testAuthError()">Test Auth Error (401)</button>
                        <button class="btn btn-danger" onclick="testGeneralError()">Test General Error (500)</button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Result</h5>
                    </div>
                    <div class="card-body">
                        <div id="bpjsError" class="alert" style="display: none;">
                            <div id="bpjsErrorMessage"></div>
                        </div>
                        <div id="bpjsRetryButtonContainer" style="display: none;">
                            <button class="btn btn-primary btn-sm">Coba Lagi</button>
                        </div>
                        <div id="icareBpjsContainer" style="display: none;">
                            <button class="btn btn-info btn-sm">i-Care</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function testAuthError() {
            console.log('Testing authentication error...');
            
            $.ajax({
                url: '/test/bpjs-auth-error',
                type: 'GET',
                success: function(response) {
                    console.log('Success response:', response);
                    handleBpjsResponse(response);
                },
                error: function(xhr) {
                    console.log('Error response:', xhr);
                    handleBpjsError(xhr);
                }
            });
        }
        
        function testGeneralError() {
            console.log('Testing general error...');
            
            $.ajax({
                url: '/test/bpjs-general-error',
                type: 'GET',
                success: function(response) {
                    console.log('Success response:', response);
                    handleBpjsResponse(response);
                },
                error: function(xhr) {
                    console.log('Error response:', xhr);
                    handleBpjsError(xhr);
                }
            });
        }
        
        function handleBpjsResponse(response) {
            $('#bpjsError').show();
            
            // Reset classes
            $('#bpjsError').removeClass('alert-info alert-danger alert-warning');
            $('#bpjsRetryButtonContainer').hide();
            $('#icareBpjsContainer').hide();
            
            // Klasifikasi pesan error berdasarkan kode dan pesan
            if (response.metaData.code === 401 || response.metaData.code === 403 || 
                (response.metaData.message && response.metaData.message.includes('Password Pcare'))) {
                // Error authentication/credential
                $('#bpjsError').addClass('alert-warning');
                $('#bpjsErrorMessage').html('<i class="fas fa-exclamation-triangle"></i> <b>' + response.metaData.message + '</b>');
                $('#bpjsRetryButtonContainer').hide();
                $('#icareBpjsContainer').hide();
            } else if (response.metaData.code >= 500) {
                // Error server (500+)
                $('#bpjsError').addClass('alert-danger');
                $('#bpjsErrorMessage').html('<b>Server BPJS mengalami masalah.</b><br>Kode: ' + response.metaData.code + '<br>Pesan: ' + response.metaData.message);
                $('#bpjsRetryButtonContainer').show();
            } else {
                // Error umum
                $('#bpjsError').addClass('alert-warning');
                $('#bpjsErrorMessage').html('<b>Gagal mendapatkan data BPJS.</b><br>Kode: ' + response.metaData.code + '<br>Pesan: ' + response.metaData.message);
                $('#bpjsRetryButtonContainer').show();
            }
        }
        
        function handleBpjsError(xhr) {
            $('#bpjsError').show();
            
            // Reset classes
            $('#bpjsError').removeClass('alert-info alert-danger alert-warning');
            $('#bpjsRetryButtonContainer').hide();
            $('#icareBpjsContainer').hide();
            
            // Cek jika error authentication/credential
            if (xhr.status === 401 || xhr.status === 403 || 
                (xhr.responseJSON && xhr.responseJSON.metaData && 
                 xhr.responseJSON.metaData.message && 
                 xhr.responseJSON.metaData.message.includes('Password Pcare'))) {
                
                $('#bpjsError').addClass('alert-warning');
                $('#bpjsErrorMessage').html('<i class="fas fa-exclamation-triangle"></i> <b>' + 
                    (xhr.responseJSON?.metaData?.message || 'Maaf Cek Kembali Password Pcare Anda') + '</b>');
                $('#bpjsRetryButtonContainer').hide();
                $('#icareBpjsContainer').hide();
            } else if (xhr.status === 500) {
                $('#bpjsError').addClass('alert-danger');
                $('#bpjsErrorMessage').html('<b>Server BPJS mengalami masalah internal.</b><br>Mohon coba lagi nanti atau hubungi administrator jika masalah berlanjut.');
                $('#bpjsRetryButtonContainer').show();
            } else {
                $('#bpjsError').addClass('alert-warning');
                $('#bpjsErrorMessage').html('<b>Tidak dapat memperoleh data BPJS.</b><br>' + 
                                          (xhr.responseJSON?.metaData?.message || 'Gagal menghubungi server BPJS dengan kode error: ' + xhr.status));
                $('#bpjsRetryButtonContainer').show();
            }
        }
    </script>
</body>
</html>
